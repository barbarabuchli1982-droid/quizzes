<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quiz — Triângulos Semelhantes (Módulo 11)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;overflow-x:hidden}
:root{--cyan:#00e5ff;--green:#39ff14;--bg:#0a0a0f;--card:#111827;--red:#ff4444;--yellow:#ffeb3b}

#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

#header{background:linear-gradient(135deg,#001a20,#002a10);border-bottom:2px solid var(--cyan);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
#header h1{font-size:1rem;color:var(--cyan);letter-spacing:.5px}
#progress-bar-wrap{flex:1;min-width:120px;height:8px;background:#1a2a2a;border-radius:4px;margin:0 12px}
#progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .4s}
#counter{font-size:.85rem;color:#aaa;white-space:nowrap}

#streak-badge{position:fixed;top:70px;right:16px;background:linear-gradient(135deg,#ff6d00,#ff9800);border-radius:20px;padding:6px 14px;font-size:.8rem;font-weight:700;display:none;z-index:100;animation:pop .3s ease;box-shadow:0 0 12px #ff9800}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

#main{max-width:680px;margin:24px auto;padding:0 16px 40px}
.card{background:var(--card);border-radius:16px;border:1px solid #1e3a3a;padding:24px;margin-bottom:20px;box-shadow:0 4px 24px rgba(0,229,255,.07)}

.q-label{display:inline-block;background:linear-gradient(90deg,var(--cyan),var(--green));color:#000;font-size:.72rem;font-weight:700;border-radius:20px;padding:3px 12px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px}
.q-topic{color:#888;font-size:.78rem;margin-bottom:12px}
.q-text{font-size:1rem;line-height:1.6;color:#e0e0e0;margin-bottom:16px}

.q-fig{margin:12px 0;text-align:center}
.q-fig svg,.q-fig img{max-width:100%}

.options{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.opt{background:#0d1a1a;border:1.5px solid #1e3a3a;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:.95rem;transition:all .2s;text-align:left;color:#d0d0d0;display:flex;align-items:center;gap:10px;width:100%}
.opt:hover:not(.disabled){border-color:var(--cyan);background:#0d2424;color:#fff;transform:translateX(3px)}
.opt-letter{width:26px;height:26px;border-radius:50%;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;color:var(--cyan)}
.opt.correct-ans{border-color:var(--green);background:rgba(57,255,20,.1);color:#fff}
.opt.correct-ans .opt-letter{background:var(--green);border-color:var(--green);color:#000}
.opt.wrong-ans{border-color:var(--red);background:rgba(255,68,68,.1);color:#fff}
.opt.wrong-ans .opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.opt.disabled{cursor:default}

#explanation{display:none;margin-top:16px;background:rgba(0,229,255,.07);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;padding:12px 16px;font-size:.9rem;line-height:1.6;color:#c0e0e0}
#explanation b{color:var(--green)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:30px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;letter-spacing:.5px;transition:all .2s}
.btn-next{background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;margin-top:18px}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,229,255,.3)}
.btn-next:disabled{opacity:.4;cursor:default;transform:none}
#btn-wrap{display:flex;justify-content:flex-end}

#final-screen{display:none;text-align:center;padding:32px 16px}
.medal{font-size:5rem;margin:16px 0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#final-screen h2{font-size:1.8rem;color:var(--cyan);margin-bottom:8px}
#final-score-text{font-size:1.1rem;color:#aaa;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:400px;margin:0 auto 24px}
.stat-box{background:#111827;border:1px solid #1e3a3a;border-radius:12px;padding:16px 8px}
.stat-num{font-size:1.6rem;font-weight:700;color:var(--green)}
.stat-lbl{font-size:.75rem;color:#777;margin-top:4px}
.btn-restart{background:linear-gradient(135deg,#ff6d00,#ff9800);color:#fff;padding:14px 36px;font-size:1rem}
.btn-restart:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,152,0,.4)}

#start-screen{text-align:center;padding:40px 16px}
#start-screen h2{font-size:1.5rem;color:var(--cyan);margin-bottom:12px}
#start-screen p{color:#aaa;margin-bottom:28px;line-height:1.6}
.btn-start{background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;padding:14px 40px;font-size:1.05rem}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="streak-badge">🔥 Sequência: <span id="streak-num">0</span></div>

<div id="header">
  <h1>📐 Triângulos Semelhantes — Módulo 11</h1>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="counter">0 / 31</div>
</div>

<div id="main">
  <div id="start-screen" class="card">
    <h2>🚀 Quiz — Triângulos Semelhantes</h2>
    <p>31 questões · Dark Neon · Gabarito explicado<br/>
    Teorema de Tales · Casos AA, LAL, LLL · Triângulos Retângulos</p>
    <button class="btn btn-start" onclick="startQuiz()">▶ Começar</button>
  </div>

  <div id="quiz-screen" style="display:none">
    <div class="card">
      <div class="q-label" id="q-label"></div>
      <div class="q-topic" id="q-topic"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-fig" id="q-fig"></div>
      <div class="options" id="options"></div>
      <div id="explanation"></div>
      <div id="btn-wrap"><button class="btn btn-next" id="btn-next" disabled onclick="nextQ()">Próxima →</button></div>
    </div>
  </div>

  <div id="final-screen" class="card">
    <div class="medal" id="medal-icon">🏆</div>
    <h2 id="final-title">Resultado Final</h2>
    <p id="final-score-text"></p>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="stat-correct">0</div><div class="stat-lbl">✅ Acertos</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-wrong">0</div><div class="stat-lbl">❌ Erros</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">🔥 Maior sequência</div></div>
    </div>
    <button class="btn btn-restart" onclick="restartQuiz()">↩ Recomeçar</button>
  </div>
</div>

<script>
const QUESTIONS = [
{
  id:1,
  label:"Ex.1 — Q1a",
  topic:"Razão de semelhança T₂/T₃",
  text:"Os triângulos T₂ (lados 4, 6, 8) e T₃ (lados 6, 9, 12) são semelhantes. Qual é a razão de semelhança T₂/T₃?",
  fig:`<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="30,150 110,150 70,80" stroke="#00e5ff" fill="none" stroke-width="2"/><text x="70" y="75" text-anchor="middle" fill="#00e5ff" font-size="11">T₂</text><text x="50" y="158" text-anchor="middle" fill="#ffffff" font-size="10">4</text><text x="92" y="158" text-anchor="middle" fill="#ffffff" font-size="10">6</text><text x="38" y="120" text-anchor="middle" fill="#ffffff" font-size="10">8</text><polygon points="140,150 240,150 190,70" stroke="#39ff14" fill="none" stroke-width="2"/><text x="190" y="65" text-anchor="middle" fill="#39ff14" font-size="11">T₃</text><text x="175" y="158" text-anchor="middle" fill="#ffffff" font-size="10">6</text><text x="225" y="158" text-anchor="middle" fill="#ffffff" font-size="10">9</text><text x="148" y="118" text-anchor="middle" fill="#ffffff" font-size="10">12</text></svg>`,
  options:["4/9", "2/3", "1/2", "3/4"],
  correct:1,
  exp:"Dividindo lados correspondentes: 4/6 = 6/9 = 8/12 = <b>2/3</b>. A razão T₂/T₃ = 2/3."
},
{
  id:2,
  label:"Ex.1 — Q1b",
  topic:"Maior lado de T₃",
  text:"Com a razão T₂/T₃ = 2/3 e o maior lado de T₂ sendo 8 cm, qual é o maior lado de T₃?",
  fig:`<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="30,150 130,150 80,70" stroke="#00e5ff" fill="none" stroke-width="2"/><text x="80" y="65" text-anchor="middle" fill="#00e5ff" font-size="11">T₂</text><text x="65" y="162" text-anchor="middle" fill="#ffffff" font-size="10">6</text><text x="100" y="162" text-anchor="middle" fill="#ffffff" font-size="10">4</text><text x="35" y="118" text-anchor="middle" fill="#ffffff" font-size="10">8</text><polygon points="150,150 250,150 200,70" stroke="#39ff14" fill="none" stroke-width="2"/><text x="200" y="65" text-anchor="middle" fill="#39ff14" font-size="11">T₃</text><text x="185" y="162" text-anchor="middle" fill="#ffffff" font-size="10">9</text><text x="230" y="162" text-anchor="middle" fill="#ffffff" font-size="10">6</text><text x="155" y="118" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight='bold'>?</text></svg>`,
  options:["10 cm", "12 cm", "18 cm", "9 cm"],
  correct:1,
  exp:"8/(maior lado T₃) = 2/3 → maior lado T₃ = 8 × 3/2 = <b>12 cm</b>."
},
{
  id:3,
  label:"P.467 — Q3",
  topic:"Razão ABC/GHI",
  text:"Se ΔABC ~ ΔGHI com lados ABC = (2, 3, 4) e GHI = (6, 9, 12), qual é a razão de semelhança ABC/GHI?",
  fig:`<svg viewBox="0 0 270 185" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="20,150 80,150 50,90" stroke="#00e5ff" fill="none" stroke-width="2"/><text x="20" y="168" text-anchor="middle" fill="#00e5ff" font-size="10">A</text><text x="80" y="168" text-anchor="middle" fill="#00e5ff" font-size="10">B</text><text x="50" y="84" text-anchor="middle" fill="#00e5ff" font-size="10">C</text><text x="50" y="130" text-anchor="middle" fill="#ffffff" font-size="9">1</text><polygon points="120,150 240,150 180,60" stroke="#39ff14" fill="none" stroke-width="2"/><text x="115" y="168" text-anchor="middle" fill="#39ff14" font-size="10">G</text><text x="240" y="168" text-anchor="middle" fill="#39ff14" font-size="10">H</text><text x="180" y="54" text-anchor="middle" fill="#39ff14" font-size="10">I</text><text x="180" y="120" text-anchor="middle" fill="#ffffff" font-size="9">3</text></svg>`,
  options:["2/3", "1/2", "1/3", "3/4"],
  correct:2,
  exp:"2/6 = 3/9 = 4/12 = <b>1/3</b>. Razão ABC/GHI = 1/3."
},
{
  id:4,
  label:"P.467 — Q4",
  topic:"Razão DEF/GHI",
  text:"ΔDEF tem lados (4, 6, 8) e ΔGHI tem lados (6, 9, 12). Qual é a razão de semelhança DEF/GHI?",
  fig:`<svg viewBox="0 0 270 185" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="20,150 110,150 65,80" stroke="#00e5ff" fill="none" stroke-width="2"/><text x="16" y="168" text-anchor="middle" fill="#00e5ff" font-size="10">D</text><text x="110" y="168" text-anchor="middle" fill="#00e5ff" font-size="10">E</text><text x="65" y="74" text-anchor="middle" fill="#00e5ff" font-size="10">F</text><text x="60" y="130" text-anchor="middle" fill="#ffffff" font-size="9">2</text><polygon points="140,150 240,150 190,80" stroke="#39ff14" fill="none" stroke-width="2"/><text x="136" y="168" text-anchor="middle" fill="#39ff14" font-size="10">G</text><text x="240" y="168" text-anchor="middle" fill="#39ff14" font-size="10">H</text><text x="190" y="74" text-anchor="middle" fill="#39ff14" font-size="10">I</text><text x="185" y="130" text-anchor="middle" fill="#ffffff" font-size="9">3</text></svg>`,
  options:["1/3", "3/4", "1/2", "2/3"],
  correct:3,
  exp:"4/6 = 6/9 = 8/12 = <b>2/3</b>. Razão DEF/GHI = 2/3."
},
{
  id:5,
  label:"P.465 — Q2a",
  topic:"Ângulo α em triângulo semelhante",
  text:"Em dois triângulos semelhantes, os ângulos de um são 60°, 38° e α. Qual é o valor de α?",
  fig:`<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="40,150 220,150 130,50" stroke="#00e5ff" fill="none" stroke-width="2"/><text x="30" y="145" text-anchor="start" fill="#ffffff" font-size="10">60°</text><text x="215" y="145" text-anchor="end" fill="#ffffff" font-size="10">38°</text><text x="130" y="44" text-anchor="middle" fill="#ffeb3b" font-size="13" font-weight='bold'>α</text></svg>`,
  options:["82°", "78°", "90°", "68°"],
  correct:0,
  exp:"Soma dos ângulos = 180°: α = 180° − 60° − 38° = <b>82°</b>."
},
{
  id:6,
  label:"P.465 — Q2c",
  topic:"Calcule x e y (lados proporcionais)",
  text:"Dois triângulos semelhantes têm lados 10 e 14 no menor, e x e y no maior. Com razão 3/4, quais são x e y?",
  fig:`<svg viewBox="0 0 260 175" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="20,150 100,150 60,70" stroke="#00e5ff" fill="none" stroke-width="2"/><text x="60" y="64" text-anchor="middle" fill="#00e5ff" font-size="10">A</text><text x="16" y="165" text-anchor="middle" fill="#00e5ff" font-size="10">B</text><text x="100" y="165" text-anchor="middle" fill="#00e5ff" font-size="10">C</text><text x="55" y="158" text-anchor="middle" fill="#ffffff" font-size="9">10</text><text x="28" y="115" text-anchor="middle" fill="#ffffff" font-size="9">14</text><polygon points="130,150 230,150 180,70" stroke="#39ff14" fill="none" stroke-width="2"/><text x="180" y="64" text-anchor="middle" fill="#39ff14" font-size="10">D</text><text x="126" y="165" text-anchor="middle" fill="#39ff14" font-size="10">E</text><text x="230" y="165" text-anchor="middle" fill="#39ff14" font-size="10">F</text><text x="172" y="158" text-anchor="middle" fill="#ffeb3b" font-size="11">x</text><text x="136" y="115" text-anchor="middle" fill="#ffeb3b" font-size="11">y</text><text x="130" y="30" text-anchor="middle" fill="#ffffff" font-size="9">Triângulos semelhantes</text></svg>`,
  options:["x=15; y=21", "x=7,5; y=10,5", "x=20; y=28", "x=12; y=16"],
  correct:1,
  exp:"x = 10 × 3/4 = 7,5 e y = 14 × 3/4 = 10,5. Resposta: <b>x = 7,5; y = 10,5</b>."
},
{
  id:7,
  label:"Ex.2 — Q1a",
  topic:"Calcule a (Teorema de Tales)",
  text:"Três retas paralelas cortadas por duas transversais: 1ª transversal tem segmentos 4 e 3; 2ª tem a e 7. Calcule a.",
  fig:`<svg viewBox="0 0 260 190" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><line x1="20" y1="40" x2="240" y2="40" stroke="#00e5ff" stroke-width="2"/><line x1="20" y1="110" x2="240" y2="110" stroke="#00e5ff" stroke-width="2"/><line x1="20" y1="160" x2="240" y2="160" stroke="#00e5ff" stroke-width="2"/><line x1="60" y1="20" x2="80" y2="175" stroke="#ffffff" stroke-width="1.5"/><line x1="140" y1="20" x2="180" y2="175" stroke="#ffffff" stroke-width="1.5"/><text x="65" y="38" text-anchor="middle" fill="#ffffff" font-size="10">4</text><text x="145" y="38" text-anchor="middle" fill="#ffeb3b" font-size="11" font-weight='bold'>a</text><text x="62" y="108" text-anchor="middle" fill="#ffffff" font-size="10">3</text><text x="148" y="108" text-anchor="middle" fill="#ffffff" font-size="10">7</text><text x="130" y="180" text-anchor="middle" fill="#ffffff" font-size="9">(retas paralelas)</text></svg>`,
  options:["28/3", "7/3", "21/4", "9"],
  correct:0,
  exp:"Pelo Teorema de Tales: 4/3 = a/7 → a = 4×7/3 = <b>28/3 ≈ 9,3</b>."
},
{
  id:8,
  label:"Ex.2 — Q1b",
  topic:"Calcule b (ceviana)",
  text:"Em ΔABC, uma ceviana divide o lado. Os segmentos são b e 8, e os lados proporcionais são 6 e 2. Calcule b.",
  fig:`<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><polygon points="30,160 230,160 130,40" stroke="#00e5ff" fill="none" stroke-width="2"/><line x1="90" y1="160" x2="110" y2="100" stroke="#39ff14" stroke-width="1.5" stroke-dasharray="4 2"/><text x="130" y="34" text-anchor="middle" fill="#00e5ff" font-size="10">A</text><text x="24" y="170" text-anchor="middle" fill="#00e5ff" font-size="10">B</text><text x="230" y="170" text-anchor="middle" fill="#00e5ff" font-size="10">C</text><text x="100" y="168" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight='bold'>b</text><text x="115" y="168" text-anchor="middle" fill="#ffffff" font-size="10">8</text><text x="72" y="140" text-anchor="middle" fill="#ffffff" font-size="10">6</text><text x="108" y="125" text-anchor="middle" fill="#ffffff" font-size="10">2</text></svg>`,
  options:["3", "6", "4", "5"],
  correct:2,
  exp:"Pela proporcionalidade: 6/2 = (b+8)/8 → 3×8 = b+8 → b = <b>4</b>."
},
{
  id:9,
  label:"Ex.2 — Q2",
  topic:"Altura do poste",
  text:"Um poste projeta sombra de 5 m. Uma régua de 1,7 m projeta sombra de 1 m no mesmo instante. Qual é a altura do poste?",
  fig:`<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:8px auto"><line x1="20" y1="160" x2="240" y2="160" stroke="#ffffff" stroke-width="2"/><line x1="60" y1="160" x2="60" y2="60" stroke="#00e5ff" stroke-width="2"/><text x="52" y="115" text-anchor="end" fill="#ffeb3b" font-size="12" font-weight='bold'>h</text><text x="55" y="170" text-anchor="middle" fill="#ffeb3b" font-size="11">?</text><line x1="60" y1="60" x2="200" y2="160" stroke="#00e5ff" stroke-width="1.5"/><line x1="140" y1="160" x2="140" y2="128" stroke="#39ff14" stroke-width="2"/><text x="143" y="140" text-anchor="start" fill="#39ff14" font-size="9">1,7m</text><text x="95" y="170" text-anchor="middle" fill="#ffffff" font-size="9">5m</text><text x="170" y="170" text-anchor="middle" fill="#ffffff" font-size="9">3m</text><text x="130" y="30" text-anchor="middle" fill="#ffffff" font-size="9">Triângulos semelhantes</text></svg>`,
  options:["8,5 m", "7,5 m", "10 m", "6,8 m"],
  correct:0,
  exp:"Triângulos semelhantes: h/1,7 = 5/1 → h = 1,7 × 5 = <b>8,5 m</b>."
},
{
  id:10,
  label:"Ex.2 — Q3",

  const letters=['a','b','c','d','e'];
  q.options.forEach((o,idx)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-letter">${letters[idx]}</span><span>${o}</span>`;
    btn.onclick=()=>choose(idx,q);
    opts.appendChild(btn);
  });
  const pct=(i/QUESTIONS.length)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('counter').textContent=(i+1)+' / '+QUESTIONS.length;
}

function choose(idx,q){
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>{o.classList.add('disabled');o.onclick=null;});
  const ok=idx===q.correct;
  opts[idx].classList.add(ok?'correct-ans':'wrong-ans');
  opts[q.correct].classList.add('correct-ans');
  if(ok){score++;streak++;bestStreak=Math.max(bestStreak,streak);}
  else{wrong++;streak=0;}
  updateStreak();
  const exp=document.getElementById('explanation');
  exp.innerHTML='💡 '+q.exp;
  exp.style.display='block';
  document.getElementById('btn-next').disabled=false;
}

function updateStreak(){
  const b=document.getElementById('streak-badge');
  if(streak>=2){document.getElementById('streak-num').textContent=streak;b.style.display='block';}
  else{b.style.display='none';}
}

function nextQ(){
  current++;
  if(current>=QUESTIONS.length){showFinal();}
  else{showQ(current);}
}

function showFinal(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('final-screen').style.display='block';
  document.getElementById('progress-bar').style.width='100%';
  document.getElementById('counter').textContent=QUESTIONS.length+' / '+QUESTIONS.length;
  const pct=Math.round((score/QUESTIONS.length)*100);
  document.getElementById('stat-correct').textContent=score;
  document.getElementById('stat-wrong').textContent=wrong;
  document.getElementById('stat-streak').textContent=bestStreak;
  let medal='📚',title='Continue estudando!';
  if(pct>=90){medal='🏆';title='Excelente! Mestre dos Triângulos!';}
  else if(pct>=75){medal='🥇';title='Ótimo resultado!';}
  else if(pct>=60){medal='🥈';title='Bom trabalho!';}
  else if(pct>=40){medal='🥉';title='Quase lá!';}
  document.getElementById('medal-icon').textContent=medal;
  document.getElementById('final-title').textContent=title;
  document.getElementById('final-score-text').textContent=pct+'% de acerto — '+score+' de '+QUESTIONS.length+' questões';
  if(pct>=70)launchConfetti();
}

function restartQuiz(){
  current=0;score=0;streak=0;bestStreak=0;wrong=0;
  document.getElementById('streak-badge').style.display='none';
  document.getElementById('final-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  showQ(0);
}

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#00e5ff','#39ff14','#ffeb3b','#ff6d00','#ff4081','#fff'];
  const pieces=Array.from({length:150},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*7+3,color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*3,vy:Math.random()*3+2,angle:Math.random()*360,spin:(Math.random()-.5)*4
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;
    });
    frame++;
    if(frame<200)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
</script>
</body>
