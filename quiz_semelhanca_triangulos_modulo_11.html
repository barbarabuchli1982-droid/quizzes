<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz - Semelhança de Triângulos | Módulo 11</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #17223d;
      --text: #eef4ff;
      --muted: #aab7d4;
      --line: rgba(255,255,255,.12);
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(56,189,248,.18), transparent 30rem),
        radial-gradient(circle at 85% 15%, rgba(34,197,94,.12), transparent 25rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { width: min(980px, 100%); margin: 0 auto; padding: 20px; }
    header { display: grid; gap: 14px; padding: 14px 0 18px; }
    .topline { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(1.35rem, 2.5vw, 2.2rem); line-height: 1.1; letter-spacing: 0; }
    .subtitle { margin: 0; color: var(--muted); font-size: .96rem; }
    .pill { border: 1px solid var(--line); background: rgba(255,255,255,.06); padding: 8px 12px; border-radius: 999px; color: var(--muted); font-weight: 700; }
    .progress { height: 12px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width .25s ease; }
    main { background: rgba(18,26,47,.92); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 24px 70px rgba(0,0,0,.35); overflow: hidden; }
    .question { padding: clamp(18px, 4vw, 34px); display: grid; gap: 18px; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-weight: 700; font-size: .88rem; }
    .statement { font-size: clamp(1.08rem, 2vw, 1.35rem); line-height: 1.55; margin: 0; }
    .original { color: var(--muted); border-left: 3px solid var(--blue); padding: 10px 12px; margin: 0; background: rgba(56,189,248,.06); border-radius: 0 8px 8px 0; line-height: 1.5; }
    .figureBox { border: 1px dashed rgba(170,183,212,.55); border-radius: 8px; background: rgba(255,255,255,.04); padding: 14px; display: grid; gap: 10px; }
    .figureBox img { max-width: 100%; max-height: 360px; object-fit: contain; justify-self: center; border-radius: 8px; background: #fff; }
    .options { display: grid; gap: 10px; }
    .option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 15px 16px;
      font-size: 1rem;
      line-height: 1.35;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .option:hover { transform: translateY(-1px); border-color: rgba(56,189,248,.75); }
    .option.selected.correct { background: rgba(34,197,94,.16); border-color: var(--green); }
    .option.selected.wrong { background: rgba(239,68,68,.15); border-color: var(--red); }
    .option:disabled { cursor: default; transform: none; }
    .feedback { min-height: 58px; border-radius: 8px; border: 1px solid var(--line); padding: 14px; color: var(--muted); line-height: 1.45; background: rgba(255,255,255,.04); }
    .feedback.good { border-color: rgba(34,197,94,.6); color: #dcfce7; background: rgba(34,197,94,.12); }
    .feedback.bad { border-color: rgba(239,68,68,.6); color: #fee2e2; background: rgba(239,68,68,.12); }
    nav { display: flex; justify-content: space-between; gap: 12px; padding: 16px clamp(18px, 4vw, 34px); border-top: 1px solid var(--line); background: rgba(0,0,0,.14); }
    .navbtn {
      min-width: 126px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 16px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }
    .navbtn.primary { background: linear-gradient(135deg, #0284c7, #16a34a); border-color: transparent; }
    .navbtn:disabled { opacity: .45; cursor: not-allowed; }
    .result { padding: clamp(18px, 4vw, 34px); display: none; gap: 16px; }
    .score { font-size: clamp(1.8rem, 5vw, 3rem); margin: 0; font-weight: 900; }
    .review { display: grid; gap: 10px; }
    .reviewItem { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: rgba(255,255,255,.04); }
    @media (max-width: 560px) {
      .wrap { padding: 12px; }
      nav { position: sticky; bottom: 0; }
      .navbtn { min-width: 0; flex: 1; padding: 12px 10px; }
    }
  </style>
</head>

        original: "Um disco voador estacionou a 50 m do solo. Um helicóptero, 30 m acima do objeto, iluminou-o com um holofote conforme a figura. Determine aproximadamente o raio do disco.",
        prompt: "Qual é, aproximadamente, o raio do disco-voador?",
        options: ["3 m", "6 m", "4 m", "8 m"],
        answer: 0,
        good: "Excelente! Primeiro aparece x = 6 m para o diâmetro; o raio é metade disso: 3 m.",
        bad: "Quase! A proporção da figura leva ao diâmetro x = 6 m; portanto o raio mede 3 m."
      }
    ];

    function readStore(key, fallback) {
      try {
        return localStorage.getItem(key) || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function writeStore(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {
        // O quiz continua funcionando mesmo quando o navegador bloqueia armazenamento local.
      }
    }

    function parseStore(key) {
      try {
        return JSON.parse(readStore(key, "{}"));
      } catch (error) {
        return {};
      }
    }

    let current = Number(readStore("triangulos_current", "0"));
    const savedAnswers = parseStore("triangulos_answers");
    if (!Number.isFinite(current) || current < 0 || current > questions.length) current = 0;

    const qView = document.getElementById("questionView");
    const rView = document.getElementById("resultView");
    const bar = document.getElementById("bar");
    const scorePill = document.getElementById("scorePill");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    function saveState() {
      writeStore("triangulos_current", String(current));
      writeStore("triangulos_answers", JSON.stringify(savedAnswers));
    }

    function score() {
      return questions.reduce((sum, q, index) => sum + (savedAnswers[index] === q.answer ? 1 : 0), 0);
    }

    function render() {
      const done = current >= questions.length;
      qView.style.display = done ? "none" : "grid";
      rView.style.display = done ? "grid" : "none";
      bar.style.width = `${Math.min(current, questions.length) / questions.length * 100}%`;
      scorePill.textContent = `${score()} acertos`;
      backBtn.disabled = current === 0;
      nextBtn.textContent = done ? "Reiniciar" : (current === questions.length - 1 ? "Finalizar" : "Próxima");
      if (done) return renderResult();

      const q = questions[current];
      const selected = savedAnswers[current];
      qView.innerHTML = `
        <div class="meta">
          <span>${q.source}</span>
          <span>${q.skill}</span>
        </div>
        ${q.needsImage ? renderFigure(current) : ""}
        <p class="original">${q.original}</p>
        <p class="statement">${q.prompt}</p>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="option ${selected === i ? (i === q.answer ? "selected correct" : "selected wrong") : ""}" type="button" data-option="${i}">
              ${String.fromCharCode(65 + i)}) ${opt}
            </button>
          `).join("")}
        </div>
        <div class="feedback ${selected === undefined ? "" : (selected === q.answer ? "good" : "bad")}">
          ${selected === undefined ? "Escolha uma alternativa para receber feedback imediato." : (selected === q.answer ? q.good : q.bad)}
        </div>
      `;
    }

    function renderFigure(index) {
      const img = questions[index].image;
      return `
        <div class="figureBox">
          <img src="${img}" alt="Figura da ${questions[index].source}">
        </div>
      `;
    }

    window.choose = function choose(index) {
      savedAnswers[current] = index;
      saveState();
      render();
    };

    function renderResult() {
      const total = questions.length;
      const pct = Math.round(score() / total * 100);
      rView.innerHTML = `
        <p class="score">${score()} de ${total} acertos (${pct}%)</p>
        <p class="subtitle">Você concluiu a lista completa mantendo a ordem do material original.</p>
        <div class="review">
          ${questions.map((q, i) => {
            const selected = savedAnswers[i];
            const ok = selected === q.answer;
            return `<div class="reviewItem">
              <strong>${q.source}</strong> - ${ok ? "correta" : "revisar"}<br>
              <span class="subtitle">Resposta: ${q.options[q.answer]}</span>
            </div>`;
          }).join("")}
        </div>
      `;
    }

    qView.addEventListener("click", (event) => {
      const option = event.target.closest("[data-option]");
      if (option) window.choose(Number(option.dataset.option));
    });

    backBtn.addEventListener("click", () => {
      if (current > 0) current--;
      saveState();
      render();
    });

    nextBtn.addEventListener("click", () => {
      if (current >= questions.length) {
        current = 0;
        for (const key of Object.keys(savedAnswers)) delete savedAnswers[key];
      } else {
        current++;
      }
      saveState();
      render();
    });

    render();
  </script>

</html>
