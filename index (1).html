let current=0;
let answers=new Array(questions.length).fill(null);

function render(){
const q=questions[current];
document.getElementById('counter').innerText=`${current+1} / ${questions.length}`;

document.getElementById('quiz').innerHTML=`
<h2 class="text-2xl font-bold mb-4">"${q.sentence}"</h2>
<p class="mb-5">${q.ask}</p>

${q.options.map((o,i)=>`
<button class="option" onclick="answer(${i})">
${o}
</button>`).join('')}

<div id="feedback" class="mt-4 font-bold"></div>
`;

if(answers[current]!==null) restore();
}

function answer(i){
if(answers[current]!==null) return;

answers[current]=i;

restore();
}

function restore(){
const q=questions[current];
const buttons=document.querySelectorAll('.option');
const selected=answers[current];

buttons.forEach((b,i)=>{
b.disabled=true;
if(q.options[i]===q.answer) b.classList.add('correct');
});

if(q.options[selected]===q.answer){
document.getElementById('feedback').innerHTML='✅ Correto!';
}else{
buttons[selected].classList.add('wrong');
document.getElementById('feedback').innerHTML='❌ Resposta: '+q.answer;
}
}

function nextQuestion(){
if(current<questions.length-1){
current++;
render();
}
}

function prevQuestion(){
if(current>0){
current--;
render();
}
}

render();
</script>
